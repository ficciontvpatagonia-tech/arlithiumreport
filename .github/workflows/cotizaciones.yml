name: Actualizar cotizaciones

on:
  schedule:
    # Lunes a viernes, 21:15 UTC (después del cierre de NYSE)
    - cron: "15 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Actualizar datos de mercado
        run: python3 _scripts/actualizar_mercado.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Sin cambios" || (git commit -m "Cotizaciones: actualización automática" && git push)
